name: A股桑基·收盘

# 收盘视频:覆盖全天 09:30–15:00(动画跳过午休、保持连续)。约 12:45(北京时间)
# 起跑:先取午盘任务上传的「上午快照」,再轮询下午 13:00–15:00,随后渲染全天并发邮件(约 15:03)。
on:
  schedule:
    - cron: '45 4 * * 1-5'        # 04:45 UTC = 12:45 北京时间,周一~周五
  workflow_dispatch:
    inputs:
      dry_run:
        description: '用合成数据走通全流程(不等盘中,几分钟出片)'
        type: boolean
        default: false

jobs:
  close:
    runs-on: ubuntu-latest
    timeout-minutes: 200           # 12:45→15:05 约 2h20m
    steps:
      - uses: actions/checkout@v4

      - name: 安装 ffmpeg + 中文字体
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      # 取午盘任务上传的上午快照,放进 data/。失败(午盘没成功)则降级为仅下午,不中断。
      - name: 取上午快照(衔接午盘任务)
        if: ${{ inputs.dry_run != true }}
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: sankey-midday.yml
          name: morning-snapshots
          path: data
          workflow_conclusion: success
          if_no_artifact_found: warn

      # 取昨日全市场基线(较昨量变用)
      - name: 取昨日全市场基线
        if: ${{ inputs.dry_run != true }}
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: sankey-close.yml
          name: market-baseline
          path: data
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: 采集下午 + 渲染收盘
        id: render
        env:
          SECTOR_KIND: concept
        run: |
          set -e
          BJDATE=$(date -u -d '+8 hours' +%Y-%m-%d)
          LABEL=$(date -u -d '+8 hours' +%-m月%-d日)
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python selfcheck.py
            echo "file=out/selfcheck_close.mp4" >> "$GITHUB_OUTPUT"
            echo "subject=【DRY】收盘桑基图自检 $LABEL" >> "$GITHUB_OUTPUT"
          else
            python collector.py --session close       # 阻塞轮询下午至 15:00,追加到同一日文件
            python run_window.py --session close       # 渲染全天 out/close_${BJDATE}.mp4
            echo "file=out/close_${BJDATE}.mp4" >> "$GITHUB_OUTPUT"
            echo "subject=📊 ${LABEL} 收盘 A股板块资金流向(全天)" >> "$GITHUB_OUTPUT"
          fi
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: 发邮件·收盘
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com      # QQ 邮箱;改回 Gmail 用 smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: A股资金流监控 <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_USERNAME }}
          subject: ${{ steps.render.outputs.subject }}
          body: |
            ${{ steps.render.outputs.label }} 收盘 全天(09:30–15:00,跳过午休)板块资金流向「动态桑基图」,见附件,下载即可发布。
            据公开市场数据整理 · 仅供参考,不构成投资建议。
          attachments: ${{ steps.render.outputs.file }}

      - name: 上传今日全市场基线(供明日较昨量变)
        if: ${{ inputs.dry_run != true }}
        uses: actions/upload-artifact@v4
        with:
          name: market-baseline
          path: data/MARKET_*.jsonl
          retention-days: 4
          if-no-files-found: warn

      - name: 备份收盘成片(Actions 页面可下载)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: close-video
          path: |
            out/close_*.mp4
            out/selfcheck_close.mp4
          retention-days: 7
          if-no-files-found: ignore
