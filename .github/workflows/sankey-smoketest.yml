name: A股桑基·连通性自测

# 随时可手动跑:只向东财抓"一次"概念板块主力净流入,验证海外 runner 能否连上国内接口。
# 绿(成功打印板块) = 可达,GitHub 方案可行;红(报错) = 不可达,建议改本地跑。
on:
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 安装依赖
        run: pip install -r requirements.txt
      - name: 多源探测(同花顺/乐咕/新浪 + 东财能否取回主力净流入)
        run: python probe_sources.py
