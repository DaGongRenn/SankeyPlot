name: A股桑基·静态图

# 手动触发:抓"当前"概念资金流渲染一张静态 PNG。盘中(15:00前)标题=盘中,收盘后标题=收盘。
# 渲染后自动发邮件。
on:
  push:
    paths:
      - '.github/workflows/sankey-snapshot.yml'
  workflow_dispatch:
    inputs:
      date:
        description: '日期 YYYY-MM-DD(留空=今天)。只影响标题,数据始终是"当前"快照。'
        required: false
        default: ''
      skip_mail:
        description: '跳过发邮件'
        type: boolean
        default: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: 安装中文字体(渲染中文必需)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓数据 + 渲染静态图
        id: render
        env:
          SECTOR_KIND: concept
        run: |
          python render_snapshot.py "${{ inputs.date }}"
          # 读取 meta.json 获取输出文件路径
          META=$(ls out/*.meta.json | tail -1)
          PREFIX=$(python -c "import json; print(json.load(open('$META'))['session'])")
          DATE=$(python -c "import json; print(json.load(open('$META'))['date'])")
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: 上传静态图(Artifacts 下载)
        uses: actions/upload-artifact@v4
        with:
          name: sankey-snapshot
          path: |
            out/close_*.png
            out/snapshot_*.png
          retention-days: 7
          if-no-files-found: error

      - name: 发邮件·静态图
        if: ${{ inputs.skip_mail != true }}
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.qq.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '465' }}
        run: |
          python emailer.py --session "${{ steps.render.outputs.prefix }}" --date "${{ steps.render.outputs.date }}"
