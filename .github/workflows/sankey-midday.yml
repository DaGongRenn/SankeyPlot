name: A股桑基·午盘

# 午盘视频:覆盖上午 09:30–11:30。约 09:10(北京时间)起跑采集器,
# 采集器内部对齐到 09:30 才首采、轮询到 11:30,随即渲染并发邮件(约 11:32)。
on:
  schedule:
    - cron: '10 1 * * 1-5'        # 01:10 UTC = 09:10 北京时间,周一~周五(留 cron 抖动余量)
  workflow_dispatch:
    inputs:
      dry_run:
        description: '用合成数据走通全流程(不等开盘,几分钟出片)'
        type: boolean
        default: false

jobs:
  midday:
    runs-on: ubuntu-latest
    timeout-minutes: 200           # 09:10→11:35 约 2h25m,远低于 6h 上限
    steps:
      - uses: actions/checkout@v4

      - name: 安装 ffmpeg + 中文字体
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      # 取昨日全市场基线(顶部氛围条的"较昨量变"用);没有则自动省略那半行
      - name: 取昨日全市场基线
        if: ${{ inputs.dry_run != true }}
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: sankey-close.yml
          name: market-baseline
          path: data
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: 采集上午 + 渲染午盘
        id: render
        env:
          SECTOR_KIND: concept
        run: |
          set -e
          BJDATE=$(date -u -d '+8 hours' +%Y-%m-%d)
          LABEL=$(date -u -d '+8 hours' +%-m月%-d日)
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python selfcheck.py
            echo "file=out/selfcheck_midday.mp4" >> "$GITHUB_OUTPUT"
            echo "subject=【DRY】午盘桑基图自检 $LABEL" >> "$GITHUB_OUTPUT"
          else
            python collector.py --session midday      # 阻塞轮询至 11:30
            python run_window.py --session midday       # 渲染 out/midday_${BJDATE}.mp4
            echo "file=out/midday_${BJDATE}.mp4" >> "$GITHUB_OUTPUT"
            echo "subject=📊 ${LABEL} 午盘 A股板块资金流向" >> "$GITHUB_OUTPUT"
          fi
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: 发邮件·午盘
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com      # QQ 邮箱;改回 Gmail 用 smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: A股资金流监控 <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_USERNAME }}
          subject: ${{ steps.render.outputs.subject }}
          body: |
            ${{ steps.render.outputs.label }} 午盘(09:30–11:30)板块资金流向「动态桑基图」,见附件,下载即可发布。
            据公开市场数据整理 · 仅供参考,不构成投资建议。
          attachments: ${{ steps.render.outputs.file }}

      - name: 上传上午快照(供收盘任务衔接)
        if: ${{ inputs.dry_run != true }}
        uses: actions/upload-artifact@v4
        with:
          name: morning-snapshots
          path: data/*.jsonl
          retention-days: 2
          if-no-files-found: warn

      - name: 备份午盘成片(Actions 页面可下载)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: midday-video
          path: |
            out/midday_*.mp4
            out/selfcheck_midday.mp4
          retention-days: 7
          if-no-files-found: ignore
