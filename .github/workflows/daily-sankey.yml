name: Daily Sankey — A股板块资金流向

# 触发条件:
# 1. 定时: 三个 UTC cron 分别对应北京时间 9:30 / 13:00 / 15:10
# 2. 手动: workflow_dispatch 允许随时触发
on:
  schedule:
    # 上午采集 — UTC 1:30 = 北京时间 9:30 (上午开盘)
    - cron: '30 1 * * 1-5'
    # 下午采集 — UTC 5:00 = 北京时间 13:00 (下午开盘)
    - cron: '0 5 * * 1-5'
    # 收盘渲染+发邮件 — UTC 7:10 = 北京时间 15:10 (收盘后10分钟)
    - cron: '10 7 * * 1-5'
  workflow_dispatch:
    inputs:
      session:
        description: '采集/渲染哪个时段 (留空则按当前北京时间自动判断)'
        required: false
        type: choice
        options:
          - auto
          - midday
          - close
          - day
        default: 'auto'
      date:
        description: '指定日期 YYYY-MM-DD (留空=今天)'
        required: false
        type: string
        default: ''
      skip_mail:
        description: '跳过发邮件'
        required: false
        type: boolean
        default: false

env:
  PYTHONUNBUFFERED: '1'
  TZ: Asia/Shanghai
  # 数据源偏好: ths=同花顺(海外可达) / em=东财(国内优先,海外不稳)
  PREFER_SOURCE: ${{ secrets.PREFER_SOURCE || 'ths' }}
  # 邮件配置(从 GitHub Secrets 读取)
  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
  MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
  MAIL_TO: ${{ secrets.MAIL_TO }}
  SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.qq.com' }}
  SMTP_PORT: ${{ secrets.SMTP_PORT || '465' }}
  WATERMARK: ${{ secrets.WATERMARK || '@主力去哪了' }}

jobs:
  # =========================================================================
  # Job 1: 上午采集 (midday) — 北京时间 9:30~11:30
  # =========================================================================
  collect-midday:
    name: 上午采集 (midday)
    # 只在定时触发(UTC 1:30)或手动触发时运行
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 1 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 上午采集约2小时,留余量
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装系统依赖(中文字体 + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk ffmpeg

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 探测数据源可达性
        run: python probe_sources.py
        continue-on-error: true

      - name: 上午采集 (9:30–11:30 BJT)
        run: python collector.py --session midday

      - name: 上传采集产物 (data/)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sankey-data-midday
          path: |
            data/*.jsonl
          retention-days: 2
          if-no-files-found: ignore
          overwrite: true

  # =========================================================================
  # Job 2: 下午采集 (close) — 北京时间 13:00~15:00
  # =========================================================================
  collect-close:
    name: 下午采集 (close)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 5 * * 1-5'
    needs: collect-midday
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装系统依赖(中文字体 + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk ffmpeg

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 下载上午采集数据
        uses: actions/download-artifact@v4
        with:
          name: sankey-data-midday
          path: data/
        continue-on-error: true

      - name: 下午采集 (13:00–15:00 BJT)
        run: python collector.py --session close

      - name: 上传全天采集产物 (data/)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sankey-data-full
          path: |
            data/*.jsonl
          retention-days: 2
          if-no-files-found: ignore
          overwrite: true

  # =========================================================================
  # Job 3: 收盘渲染 + 发邮件 — 北京时间 15:10
  # =========================================================================
  render-and-send:
    name: 收盘渲染 + 发邮件
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '10 7 * * 1-5'
    needs: collect-close
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装系统依赖(中文字体 + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk ffmpeg

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 下载全天采集数据
        uses: actions/download-artifact@v4
        with:
          name: sankey-data-full
          path: data/

      - name: 渲染收盘视频
        run: python run_window.py --session close

      - name: 上传视频产物
        uses: actions/upload-artifact@v4
        with:
          name: sankey-video-close
          path: |
            out/close_*.mp4
            out/close_*.meta.json
          retention-days: 7
          if-no-files-found: error
          overwrite: true

      - name: 发送邮件
        if: ${{ github.event.inputs.skip_mail != 'true' }}
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.qq.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '465' }}
        run: |
          # 获取今天日期(北京时间)
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          python emailer.py --session close --date "$DATE"

  # =========================================================================
  # Job 4: 自检 (每次 push/PR 时验证全链路)
  # =========================================================================
  selfcheck:
    name: 自检 (CI dry-run)
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装系统依赖(中文字体 + ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk ffmpeg

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 自检 (合成数据跑通全链路)
        run: python selfcheck.py

      - name: 上传自检产物
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selfcheck-output
          path: |
            out/selfcheck_*.mp4
            out/selfcheck_*.png
          retention-days: 3
          if-no-files-found: ignore
          overwrite: true
